services:
  - type: web
    name: spendsmart
    runtime: node
    nodeVersion: 20
    region: oregon
    plan: free
    buildCommand: |
      npm install --no-audit --no-fund
      npm run build
      cd backend
      npm install --no-audit --no-fund
      npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: /data/spendsmart.db
      - key: BASE_URL
        value: ""
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
    disks:
      - name: data
        mountPath: /data
        sizeGB: 1
